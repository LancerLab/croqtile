# lit.cfg for tests/gpu/end2end/
#
# Enables --fast-compile for all end-to-end GPU tests by default.
# Disable with: CHOREO_NO_FAST_COMPILE=1

gpu_e2e_inject_fast_compile() {
  if [[ "${CHOREO_NO_FAST_COMPILE}" != "1" ]]; then
    declare -n cmd_ref="$1"
    cmd_ref=$(echo "$cmd_ref" | sed 's#\(choreo[^ ]* -n\)#\1 --fast-compile#g')
  fi
}

register_hook "target_cmd" "gpu_e2e_inject_fast_compile"
