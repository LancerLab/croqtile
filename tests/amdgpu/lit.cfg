# co-lit
amdgpu_arch="none"
SUPPORTED_AMDGPU_TARGETS=("gfx1030" "gfx1100")

add_all_amdgpu_archs() {
  set_add REQ_TARGETS "${SUPPORTED_AMDGPU_TARGETS[@]}"
}

add_amdgpu_arch() {
  local tgts="$@"
  for tgt in ${tgts}; do
    if [[ "${tgt}" == "GFX"* ]]; then
      set_add REQ_TARGETS "$(tolower "${tgt}")"
    elif [[ "${tgt}" == "AMDGPU" ]]; then
      add_all_amdgpu_archs
    fi
  done
}

amdgpu_detect() {
  local _dev
  _dev="$(lspci 2>/dev/null | grep -i 'AMD/ATI.*VGA\|AMD/ATI.*Display' | head -1)"
  [[ -z "$_dev" ]] && return

  if command -v /opt/rocm/bin/rocminfo >/dev/null 2>&1; then
    local gfx
    gfx="$(/opt/rocm/bin/rocminfo 2>/dev/null | grep -o 'gfx[0-9]*' | head -1)"
    if [[ -n "$gfx" ]]; then
      amdgpu_arch="$gfx"
    else
      amdgpu_arch="gfx1030"
    fi
  else
    amdgpu_arch="gfx1030"
  fi

  device_type="amdgpu"
  mach="${amdgpu_arch}"
}

register_hook "all_archs" "add_all_amdgpu_archs"
register_hook "set_archs" "add_amdgpu_arch"
register_hook "hw_detect" "amdgpu_detect"

amdgpu_command() {
  declare -n cmd_ref="$1"
  cmd_ref="${cmd_ref//%amdgpu_arch/-arch=${amdgpu_arch}}"
  cmd_ref="${cmd_ref//%target/-t amdgpu}"
}
register_hook "target_cmd" "amdgpu_command"
