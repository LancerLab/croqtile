# co-lit
# Mock lit.cfg for lit.sh self-tests.
# Provides a fake machine (mock) with simulator (sim-mock400 / sim-mock500)
# so we can exercise --sim=off/on/only, --run-only, --target-only filtering
# without real hardware.

add_all_archs() {
  set_add ALL_ARCHS "mock" "sim-mock400" "sim-mock500"
}

add_arch() {
  local tgts=("$@")
  for tgt in "${tgts[@]}"; do
    if [[ "${tgt}" == "SIM" ]]; then
      set_add REQ_TARGETS "sim-mock400" "sim-mock500"
    elif [[ "${tgt}" == "SIM4" ]]; then
      set_add REQ_TARGETS "sim-mock400"
    elif [[ "${tgt}" == "SIM5" ]]; then
      set_add REQ_TARGETS "sim-mock500"
    elif [[ "${tgt}" == "MOCK" ]]; then
      set_add REQ_TARGETS "mock"
    elif [[ "${tgt}" == "MOCKALL" ]]; then
      set_add REQ_TARGETS "mock" "sim-mock400" "sim-mock500"
    fi
  done
}

mock_detect() {
  device_type="mock"
  mach="mock"
}

mock_sim_detect() {
  simulator="sim-mock400"
}

mock_cmd() {
  declare -n cmd_ref="$1"
  cmd_ref="${cmd_ref//%mock_arch/"-arch=mock"}"
}

register_hook "all_archs" "add_all_archs"
register_hook "set_archs" "add_arch"
register_hook "hw_detect" "mock_detect"
register_hook "hw_detect" "mock_sim_detect"
register_hook "target_cmd" "mock_cmd"
