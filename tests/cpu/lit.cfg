# co-lit

add_all_cpu_archs() {
  set_add REQ_TARGETS "x86_64"
}

add_cpu_arch() {
  local tgts="$@"
  for tgt in ${tgts}; do
    if [[ "${tgt}" == "CPU" ]]; then
      set_add REQ_TARGETS "x86_64"
    fi
  done
}

cpu_detect() {
  device_type="cpu"
  mach="x86_64"
}

register_hook "all_archs" "add_all_cpu_archs"
register_hook "set_archs" "add_cpu_arch"
register_hook "hw_detect"  "cpu_detect"

cpu_command() {
  declare -n cmd_ref="$1"
  cmd_ref="${cmd_ref//%target/-t cc}"
}
register_hook "target_cmd" "cpu_command"

include_dir "../check"
