# co-lit

add_all_cc_archs() {
  set_add REQ_TARGETS "x86_64"
}

add_cc_arch() {
  local tgts="$@"
  for tgt in ${tgts}; do
    if [[ "${tgt}" == "CC" ]]; then
      set_add REQ_TARGETS "x86_64"
    fi
  done
}

cc_detect() {
  device_type="cc"
  mach="x86_64"
}

register_hook "all_archs" "add_all_cc_archs"
register_hook "set_archs" "add_cc_arch"
register_hook "hw_detect"  "cc_detect"

cc_command() {
  declare -n cmd_ref="$1"
  cmd_ref="${cmd_ref//%target/-t cc}"
}
register_hook "target_cmd" "cc_command"

include_dir "../check"
