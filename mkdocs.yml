site_name: Croqtile Language Reference
site_url: http://127.0.0.1:8000

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.annotate

docs_dir: Documents/Documentation

extra_javascript:
  - assets/js/highlight.min.js
  - assets/js/choreo.js
  - assets/js/bash.min.js

extra_css:
  - assets/css/github-dark.min.css
  - assets/css/choreo.css

markdown_extensions:
  - codehilite:
      guess_lang: false
      css_class: highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Introduction: intro.md
  - "Part A -- Foundations":
    - Program Structure: program-structure.md
    - Type System: type-system.md
    - Shapes and mdspan: shapes-and-mdspan.md
    - Integers and I-Tuples: integers-and-ituples.md
  - "Part B -- Data and Memory":
    - Spanned Data: spanned-data.md
    - Symbolic and Dynamic Shapes: symbolic-and-dynamic.md
    - View Operations: view-operations.md
  - "Part C -- Control Flow and Parallelism":
    - Parallel-By: parallel-by.md
    - Iteration: iteration.md
    - Thread Masking: thread-masking.md
  - "Part D -- Data Movement":
    - DMA Basics: dma-basics.md
    - DMA Tiling: dma-tiling.md
    - DMA Advanced: dma-advanced.md
    - TMA: tma.md
  - "Part E -- Compute Primitives":
    - MMA: mma.md
    - Numerics: numerics.md
  - "Part F -- Synchronization and Async":
    - Events: events.md
    - Futures and Async: futures-and-async.md
  - "Part G -- C++ Interop":
    - Calling Device Code: call-and-device.md
    - I/O and Linking: io-and-linking.md
    - Macros: macros.md
  - "Part H -- Advanced Topics":
    - Assertions: assertions.md
    - Symbolic Evaluation: symbolic-evaluation.md
    - Dynamic Design: dynamic-design.md
  - Appendix:
    - Syntax Quick Reference: syntax-quick-ref.md
    - Operator Gallery: operator-gallery.md
    - Tileflow Optimization Patterns: tileflow-opt.md
    - Async DMA Patterns: async-dma-patterns.md
    - Elementwise Add Sample: elementwise-add-sample.md
  - "Target-Specific":
    - Calling Conventions: target/calls.md
    - Environment Setup: target/env_setting_up.md
  - Contributing: contribute.md
