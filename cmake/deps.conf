# Choreo dependency configuration.
# Branch-specific: maintained separately on main and oss/main.
# Read by cmake/LLVMBootstrap.cmake, cmake/CutlassBootstrap.cmake,
# cmake/FlexBisonBootstrap.cmake, cmake/FileCheckBootstrap.cmake,
# cmake/PythonBootstrap.cmake, cmake/GTestBootstrap.cmake,
# and tools/coir/lib/CodeGen/GCU/CMakeLists.txt.

# --- LLVM/MLIR (for CoIR tooling) ---
LLVM_SHASH=llvmorg-18.1.8
LLVM_TAR=clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz
LLVM_URL=https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz
LLVM_MD5=

# --- CUTLASS (for CUTE/GPU target) ---
CUTLASS_VERSION=v4.2.1
CUTLASS_URL=https://github.com/NVIDIA/cutlass/archive/refs/tags/v4.2.1.tar.gz
CUTLASS_TAR=cutlass-v4.2.1.tar.gz
CUTLASS_MD5=

# --- Flex/Bison (parser generator toolchain) ---
FLEX_BISON_TAR=flex-bison-kit.tar.gz
FLEX_BISON_URL=
FLEX_BISON_MD5=
BISON_SRC_URL=https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.gz
FLEX_SRC_URL=https://github.com/westes/flex/releases/download/v2.6.4/flex-2.6.4.tar.gz

# --- pybind11 (for co-py Python bindings) ---
PYBIND11_VERSION=v2.13.1
PYBIND11_TAR=pybind11-v2.13.1.tar.gz
PYBIND11_URL=https://github.com/pybind/pybind11/archive/refs/tags/v2.13.1.tar.gz
PYBIND11_MD5=911af4eca960ee2a0b24331342a2ab7e

# --- GoogleTest (for standalone unit tests) ---
GTEST_TAR=v1.14.0.tar.gz
GTEST_URL=https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
GTEST_MD5=

# --- FileCheck (LLVM test utility, for lit.sh) ---
# FileCheck is obtained from the CoIR LLVM download (default build).
# For choreo-only builds, FileCheckBootstrap.cmake extracts bin/FileCheck
# from the LLVM release tarball (LLVM_URL above) as a last resort.
