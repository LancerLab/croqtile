# co-lit
amdgpu_arch="none"
SUPPORTED_AMDGPU_TARGETS=("gfx1030" "gfx1100")

add_all_amdgpu_archs() {
  set_add REQ_TARGETS "${SUPPORTED_AMDGPU_TARGETS[@]}"
}

add_amdgpu_arch() {
  local tgts="$@"
  for tgt in ${tgts}; do
    if [[ "${tgt}" == "GFX"* ]]; then
      set_add REQ_TARGETS "$(tolower "${tgt}")"
    elif [[ "${tgt}" == "AMDGPU" ]]; then
      add_all_amdgpu_archs
    fi
  done
}

amdgpu_detect() {
  local _dev
  _dev="$(lspci 2>/dev/null | grep -i 'VGA.*AMD\|Display.*AMD' | head -1)"
  [[ -z "$_dev" ]] && return

  local gfx=""
  for node in /sys/class/kfd/kfd/topology/nodes/*/; do
    local ver
    ver="$(cat "${node}properties" 2>/dev/null | grep gfx_target_version | awk '{print $2}')"
    if [[ -n "$ver" && "$ver" != "0" ]]; then
      local major=$(( ver / 10000 ))
      local minor=$(( (ver % 10000) / 100 ))
      local step=$(( ver % 100 ))
      gfx="gfx${major}${minor}${step}"
      break
    fi
  done

  if [[ -z "$gfx" ]] && command -v /opt/rocm/bin/rocminfo >/dev/null 2>&1; then
    gfx="$(/opt/rocm/bin/rocminfo 2>/dev/null | grep -o 'gfx[0-9]*' | head -1)"
  fi

  amdgpu_arch="${gfx:-gfx1030}"
  device_type="amdgpu"
  mach="${amdgpu_arch}"
}

register_hook "all_archs" "add_all_amdgpu_archs"
register_hook "set_archs" "add_amdgpu_arch"
register_hook "hw_detect" "amdgpu_detect"

amdgpu_command() {
  declare -n cmd_ref="$1"
  cmd_ref="${cmd_ref//%hip_arch/-arch=native}"
  cmd_ref="${cmd_ref//%target/-t hip}"
}
register_hook "target_cmd" "amdgpu_command"
